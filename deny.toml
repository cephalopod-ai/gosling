[advisories]

# Deny yanked crates to catch supply chain issues early.
yanked = "deny"
# Emulate cargo-audit which only checks vulnerabilities and yanked crates, not unmaintained/unsound.
unmaintained = "none"
unsound = "none"

# Ignore proc-macro-error unmaintained warning
# See: https://github.com/repo-makeover/gosling/issues/7008
ignore = [
    "RUSTSEC-2023-0071",  # rsa: Marvin Attack timing sidechannel (no safe upgrade available, via jsonwebtoken)
    # quick-xml 0.41 is blocked on compatible docx-rs and umya-spreadsheet releases:
    # https://github.com/bokuweb/docx-rs/pull/894
    # https://github.com/MathNya/umya-spreadsheet/issues/340
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

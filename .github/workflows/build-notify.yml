name: BuildNotify

on:
  workflow_run:
    workflows:
      - CI
      - Release
      - Canary
    types: [completed]


permissions: {}

jobs:
  notify:
    if: >
      github.event.workflow_run.head_repository.full_name == github.repository &&
      github.event.workflow_run.conclusion == 'failure' &&
      (
        github.event.workflow_run.name != 'CI' ||
        github.event.workflow_run.head_branch == 'main' ||
        github.event.workflow_run.event == 'merge_group'
      )
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_GOOSE_STATUS }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          HTML_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          payload=$(jq -n \
            --arg title "❌ Build Failed" \
            --arg description "**Workflow:** ${WORKFLOW_NAME}
          **Branch:** ${HEAD_BRANCH}
          **Commit:** ${HEAD_SHA}" \
            --arg url "$HTML_URL" \
            '{embeds: [{title: $title, description: $description, url: $url, color: 15158332}]}')
          curl -sS --fail-with-body -H "Content-Type: application/json" \
            -d "$payload" \
            "$DISCORD_WEBHOOK_URL"